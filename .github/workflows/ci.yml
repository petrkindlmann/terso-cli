name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
        env:
          TERSO_SUPPRESS_BETA_NOTICE: '1'

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage
        env:
          TERSO_SUPPRESS_BETA_NOTICE: '1'
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev

  offline-emit-gate:
    name: offline-emit import gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: emit path must not import api-client
        shell: bash
        run: |
          set -euo pipefail
          if grep -RnE "api-client|OmnusApiClient|node:http|node:net|fetch\\(" src/commands/emit.ts src/lib/agent-targets.ts; then
            echo "::error::Emit code path imports network code. Surface A must stay offline."
            exit 1
          fi
          echo "Offline gate clean."
