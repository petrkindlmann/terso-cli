name: Bug report
description: Report something broken in terso-cli.
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: terso version
      description: Output of `terso --version`.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "v22.4.0"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of commands that triggers the issue.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include `terso doctor` output if possible.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
